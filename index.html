<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Office Detector</title>
  <style>
    :root { --bg:#020b18; --red:#ff4738; --white:#f7f8fb; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,71,56,.16), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(255,71,56,.12), transparent 34%),
        #020b18;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--white);
      overflow:hidden;
    }
    .wrap { width:min(600px, 96vw); text-align:center; }
    .screen { display:none; }
    .screen.active { display:block; }

    #s-intro {
      border:1px solid rgba(255,71,56,.45);
      border-radius:28px;
      background:rgba(2,11,24,.72);
      box-shadow:0 24px 80px rgba(0,0,0,.4);
      padding:40px 34px;
    }
    #s-intro h1 { font-size:clamp(22px,5vw,40px); letter-spacing:.04em; margin-bottom:14px; line-height:1.1; }
    .stamp { color:var(--red); border:3px solid var(--red); padding:.06em .16em; transform:rotate(-2deg); display:inline-block; }
    #s-intro p { opacity:.75; font-size:16px; margin-bottom:28px; }
    .btn-primary {
      border:2px solid var(--red); background:var(--red);
      color:white; padding:14px 32px; border-radius:999px;
      font-size:17px; font-weight:700; cursor:pointer;
      box-shadow:0 8px 24px rgba(255,71,56,.3);
    }

    .q-box {
      border:1px solid rgba(255,71,56,.35);
      border-radius:24px;
      background:rgba(2,11,24,.8);
      padding:36px 28px 32px;
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      overflow:visible;
    }
    .q-label { font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--red); margin-bottom:18px; opacity:.8; }
    .q-text { font-size:clamp(18px,3.5vw,26px); font-weight:700; margin-bottom:32px; line-height:1.35; }
    .progress { display:flex; gap:8px; justify-content:center; margin-bottom:24px; }
    .dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.2); transition:background .3s; }
    .dot.done { background:var(--red); }

    .btn-row {
      display:flex;
      gap:16px;
      justify-content:center;
      align-items:center;
      min-height:54px;
    }
    .btn-choice {
      border:2px solid var(--red); background:var(--red);
      color:white; padding:13px 36px; border-radius:999px;
      font-size:16px; font-weight:700; cursor:pointer;
      box-shadow:0 8px 20px rgba(255,71,56,.25);
      width:110px;
    }

    #btn-no {
      position:fixed;
      opacity:0;
      pointer-events:none;
      border:2px solid var(--red); background:var(--red);
      color:white; padding:13px 36px; border-radius:999px;
      font-size:16px; font-weight:700; cursor:pointer;
      box-shadow:0 8px 20px rgba(255,71,56,.25);
      width:110px;
    }
    #btn-no.visible {
      opacity:1;
      pointer-events:auto;
    }

    #s-birthday {
      border:1px solid rgba(255,71,56,.45);
      border-radius:28px;
      background:rgba(2,11,24,.72);
      box-shadow:0 24px 80px rgba(0,0,0,.4);
      padding:50px 34px;
      animation:pop .6s ease-out both;
    }
    #s-birthday .big { font-size:clamp(36px,8vw,72px); margin-bottom:16px; }
    #s-birthday h2 { font-size:clamp(22px,5vw,38px); font-weight:700; margin-bottom:12px; color:var(--red); }
    #s-birthday p { opacity:.75; font-size:17px; line-height:1.5; }

    @keyframes pop { from { opacity:0; transform:scale(.9); } to { opacity:1; transform:scale(1); } }
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .piece { position:absolute; width:8px; height:14px; top:-20px; animation:fall 2000ms linear forwards; }
    @keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:.1; } }
  </style>
</head>
<body>
  <div class="wrap">

    <div id="s-intro" class="screen active">
      <h1><span class="stamp">WARNING</span><br>Office Detection Link Activated</h1>
      <p>The system requires answers to a few questions before revealing the result.</p>
      <button class="btn-primary" onclick="startQuiz()">Start detection</button>
    </div>

    <div id="s-quiz" class="screen">
      <div class="q-box">
        <div class="progress" id="progress"></div>
        <div class="q-label" id="q-label">Question 1 / 5</div>
        <div class="q-text" id="q-text"></div>
        <div class="btn-row">
          <button class="btn-choice" id="btn-yes" onclick="answer()">Yes</button>
          <div id="btn-no-placeholder" style="width:110px;height:50px;"></div>
        </div>
      </div>
    </div>

    <div id="s-birthday" class="screen">
      <div class="big">🎉</div>
      <h2>Happy Birthday, Andrei!</h2>
      <p>The office misses you. Like, a lot.</p>
    </div>

  </div>

  <button id="btn-no" onmouseenter="runAway()" ontouchstart="runAway(event)">No</button>

  <div class="confetti" id="confetti"></div>

  <script>
    const questions = [
      "Are you in the office right now?",
      "Do you plan to come to the office 4–5 times a week in the future?",
      "Do you enjoy coming to the office?",
      "Is the office coffee good?",
      "Do you want us to surprise you?"
    ];
    let current = 0;

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startQuiz() {
      showScreen('s-quiz');
      buildProgress();
      showQuestion(0);
      placeNoNextToYes();
    }

    function buildProgress() {
      const p = document.getElementById('progress');
      p.innerHTML = '';
      questions.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = 'dot';
        d.id = 'dot-' + i;
        p.appendChild(d);
      });
    }

    function showQuestion(idx) {
      document.getElementById('q-label').textContent = 'Question ' + (idx+1) + ' / ' + questions.length;
      document.getElementById('q-text').textContent = questions[idx];
      for(let i = 0; i < idx; i++) document.getElementById('dot-'+i).classList.add('done');
    }

    function placeNoNextToYes() {
      const no = document.getElementById('btn-no');
      no.classList.remove('visible');
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const placeholder = document.getElementById('btn-no-placeholder');
          const rect = placeholder.getBoundingClientRect();
          no.style.left = rect.left + 'px';
          no.style.top = rect.top + 'px';
          no.classList.add('visible');
        });
      });
    }

    function runAway() {
      const btn = document.getElementById('btn-no');
      const w = btn.offsetWidth || 110;
      const h = btn.offsetHeight || 50;
      const margin = 20;
      const x = margin + Math.random() * (window.innerWidth - w - margin * 2);
      const y = margin + Math.random() * (window.innerHeight - h - margin * 2);
      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
    }

    function answer() {
      const no = document.getElementById('btn-no');
      no.classList.remove('visible');
      document.getElementById('dot-'+current).classList.add('done');
      if(current < questions.length - 1) {
        current++;
        showQuestion(current);
        setTimeout(placeNoNextToYes, 150);
      } else {
        setTimeout(() => {
          showScreen('s-birthday');
          launchConfetti();
        }, 300);
      }
    }

    function launchConfetti() {
      const box = document.getElementById('confetti');
      const colors = ['#ff4738','#f7f8fb','#ffd700','#ff69b4','#00cfff'];
      for (let i = 0; i < 100; i++) {
        const p = document.createElement('span');
        p.className = 'piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = Math.random() * 800 + 'ms';
        p.style.background = colors[Math.floor(Math.random()*colors.length)];
        p.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
        box.appendChild(p);
        setTimeout(() => p.remove(), 3000);
      }
    }
  </script>
</body>
</html>
