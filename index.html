<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Most Wanted Person in the Office</title>
  <style>
    :root { --bg:#020b18; --red:#ff4738; --white:#f7f8fb; }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,71,56,.16), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(255,71,56,.12), transparent 34%),
        #020b18;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--white);
      overflow:hidden;
    }
    .wrap { width:min(1100px, 96vw); text-align:center; }
    .intro {
      display:grid;
      gap:22px;
      place-items:center;
      padding:34px;
      border:1px solid rgba(255,71,56,.45);
      border-radius:28px;
      background:rgba(2,11,24,.72);
      box-shadow:0 24px 80px rgba(0,0,0,.4);
    }
    h1 { margin:0; font-size:clamp(34px, 6vw, 74px); letter-spacing:.04em; line-height:.95; }
    .stamp { color:var(--red); border:4px solid var(--red); padding:.08em .18em; transform:rotate(-3deg); display:inline-block; }
    p { margin:0; opacity:.82; font-size:clamp(16px, 2vw, 22px); }
    button {
      border:2px solid var(--red);
      background:var(--red);
      color:white;
      padding:15px 24px;
      border-radius:999px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 10px 28px rgba(255,71,56,.28);
    }
    button:hover { transform:translateY(-1px); }
    .card {
      display:none;
      width:100%;
      animation:pop .55s ease-out both;
    }
    .card img {
      width:100%;
      height:auto;
      display:block;
      border-radius:22px;
      box-shadow:0 30px 90px rgba(0,0,0,.55);
    }
    .show .intro { display:none; }
    .show .card { display:block; }
    @keyframes pop { from { opacity:0; transform:scale(.92) rotate(-1deg); } to { opacity:1; transform:scale(1) rotate(0); } }
    .confetti { position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .piece { position:absolute; width:8px; height:14px; background:var(--red); top:-20px; animation:fall 1800ms linear forwards; }
    @keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:.2; } }
  </style>
</head>
<body>
  <main class="wrap" id="app">
    <section class="intro">
      <h1><span class="stamp">MOST WANTED</span><br>Person in the Office</h1>
      <p>Office detection link activated. Click to reveal current status.</p>
      <button onclick="reveal()">Scan office card</button>
    </section>
    <section class="card">
      <img src="andrei-office-card.png" alt="Andrei Lossitski Most Wanted Person in the Office card">
    </section>
  </main>
  <div class="confetti" id="confetti"></div>
  <script>
    function reveal() {
      document.getElementById('app').classList.add('show');
      const box = document.getElementById('confetti');
      for (let i = 0; i < 70; i++) {
        const p = document.createElement('span');
        p.className = 'piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.animationDelay = Math.random() * 500 + 'ms';
        p.style.opacity = 0.45 + Math.random() * 0.5;
        p.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
        box.appendChild(p);
        setTimeout(() => p.remove(), 2400);
      }
    }
  </script>
</body>
</html>
